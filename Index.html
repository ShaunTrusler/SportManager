<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Manager - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Sport Manager</h1>
            <p class="subtitle">Manage your sports events and teams</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group">
                    <label for="userType">User Type:</label>
                    <select id="userType" name="userType" required>
                        <option value="">Select User Type</option>
                        <option value="manager">Team Manager</option>
                        <option value="umpire">Umpire</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="auth-divider">OR</div>

            <button id="googleLoginBtn" class="btn-google">
                <span>Sign in with Google</span>
            </button>

            <p class="signup-link">Don't have an account? <a href="#" onclick="toggleSignup()">Sign up here</a></p>
        </div>

        <!-- Signup Form -->
        <div class="signup-box" id="signupBox" style="display: none;">
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name:</label>
                    <input type="text" id="signupName" name="name" required placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email:</label>
                    <input type="email" id="signupEmail" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password:</label>
                    <input type="password" id="signupPassword" name="password" required placeholder="Create a password">
                </div>

                <div class="form-group">
                    <label for="signupUserType">User Type:</label>
                    <select id="signupUserType" name="userType" required>
                        <option value="">Select User Type</option>
                        <option value="manager">Team Manager</option>
                        <option value="umpire">Umpire</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">Create Account</button>
                <button type="button" class="btn-secondary" onclick="toggleSignup()">Back to Login</button>
            </form>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/google-sheets-api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
