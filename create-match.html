<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Match - Sport Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/create-match.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Sport Manager</h2>
                <button class="btn-menu-toggle" onclick="toggleSidebar()">☰</button>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="matches.html" class="active">Matches</a></li>
                    <li><a href="umpires.html">Umpires</a></li>
                    <li><a href="team-registration.html">Team Registration</a></li>
                    <li><a href="game-setup.html">Game Setup</a></li>
                    <li><a href="sport-registration.html">Sport Registration</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Create New Match</h1>
                <div class="user-info">
                    <span id="userDisplay">User</span>
                    <img id="userAvatar" src="https://via.placeholder.com/40" alt="User Avatar" class="avatar">
                </div>
            </header>

            <div class="create-match-container">
                <div class="form-section">
                    <h2>Match Details</h2>
                    <form id="matchForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="matchSport">Sport: *</label>
                                <select id="matchSport" required>
                                    <option value="">Select Sport</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="matchDate">Date: *</label>
                                <input type="date" id="matchDate" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="matchTime">Time: *</label>
                                <input type="time" id="matchTime" required>
                            </div>
                            <div class="form-group">
                                <label for="matchLocation">Location: *</label>
                                <input type="text" id="matchLocation" required placeholder="Enter location">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="homeTeam">Home Team: *</label>
                                <select id="homeTeam" required>
                                    <option value="">Select Team</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="awayTeam">Away Team: *</label>
                                <select id="awayTeam" required>
                                    <option value="">Select Team</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Create Match</button>
                            <button type="button" class="btn-secondary" onclick="cancelCreateMatch()">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="umpires-section">
                    <h2>Assign Umpires</h2>
                    <div class="umpires-filter">
                        <input type="text" id="umpireSearch" placeholder="Search umpires by name or location..." class="search-input">
                        <select id="umpireRankFilter" class="filter-select">
                            <option value="">All Ranks</option>
                            <option value="professional">Professional</option>
                            <option value="advanced">Advanced</option>
                            <option value="beginner">Beginner</option>
                        </select>
                    </div>

                    <div id="umpiresList" class="umpires-list">
                        <div class="loading">Loading umpires...</div>
                    </div>

                    <div class="selected-umpires-summary">
                        <h4>Selected Umpires: <span id="selectedCount">0</span></h4>
                        <div id="selectedUmpiresList" class="selected-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="js/google-sheets-api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/create-match.js"></script>
</body>
</html>
